services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: escarabajos-liga-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # ── Frontend Web (Expo static export) ────────────────────────────────────────
  - type: web
    name: escarabajos-liga-web
    runtime: static
    rootDir: mobile
    buildCommand: npm install && npx expo export -p web
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          name: escarabajos-liga-api
          type: web
          property: host

# ── Base de datos ────────────────────────────────────────────────────────────
# Usa Neon.tech (gratis) para la DB y pega el connection string en
# el Dashboard de Render → escarabajos-liga-api → Environment → DATABASE_URL
